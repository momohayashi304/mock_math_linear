<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRコード｜数学科指導法１ 模擬授業</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header .course {
            font-size: 0.95rem;
            color: #64748b;
            letter-spacing: 0.05em;
        }

        .header h1 {
            margin: 6px 0 4px 0;
            font-size: 1.7rem;
            color: #0f172a;
        }

        .header p {
            margin: 0;
            color: #475569;
            font-size: 0.95rem;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
            padding: 24px 20px;
            width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .card.linear {
            border-top: 6px solid #3498db;
        }

        .card.sqrt {
            border-top: 6px solid #16a34a;
        }

        .card h2 {
            margin: 0 0 4px 0;
            font-size: 1.3rem;
            color: #0f172a;
        }

        .card .grade {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 14px;
        }

        .qr-wrap {
            background: #fff;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 14px;
        }

        .qr-wrap canvas,
        .qr-wrap img {
            display: block;
        }

        .url-display {
            font-family: 'Courier New', Consolas, monospace;
            font-size: 0.75rem;
            color: #475569;
            background: #f1f5f9;
            padding: 6px 10px;
            border-radius: 6px;
            word-break: break-all;
            margin-bottom: 12px;
            max-width: 100%;
        }

        .open-btn {
            display: inline-block;
            background: #0f172a;
            color: #fff;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .open-btn:hover {
            background: #1e293b;
        }

        .card.linear .open-btn {
            background: #2980b9;
        }

        .card.linear .open-btn:hover {
            background: #1f6391;
        }

        .card.sqrt .open-btn {
            background: #16a34a;
        }

        .card.sqrt .open-btn:hover {
            background: #15803d;
        }

        .note {
            max-width: 720px;
            margin: 28px auto 0 auto;
            background: #fff8e1;
            border-left: 4px solid #f59e0b;
            padding: 14px 18px;
            border-radius: 6px;
            font-size: 0.9rem;
            color: #78350f;
            line-height: 1.55;
        }

        @media print {
            body {
                background: #fff;
                padding: 12px;
            }

            .open-btn,
            .note {
                display: none;
            }

            .card {
                box-shadow: none;
                border: 1px solid #ccc;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="course">数学科指導法１ ／ 模擬授業</div>
        <h1>シミュレーター QRコード</h1>
        <p>スマホ・タブレットでQRを読み込むと、それぞれの単元が直接開きます。</p>
    </div>

    <div class="grid">
        <div class="card linear">
            <h2>一次関数</h2>
            <div class="grade">中学2年 ／ 1次関数とみなすこと</div>
            <div class="qr-wrap" id="qr-linear"></div>
            <div class="url-display" id="url-linear"></div>
            <a class="open-btn" id="link-linear" href="linear.html">このページを開く</a>
        </div>

        <div class="card sqrt">
            <h2>平方根</h2>
            <div class="grade">中学3年 ／ ルートの計算（面積で発見）</div>
            <div class="qr-wrap" id="qr-sqrt"></div>
            <div class="url-display" id="url-sqrt"></div>
            <a class="open-btn" id="link-sqrt" href="sqrt.html">このページを開く</a>
        </div>
    </div>

    <div class="note">
        <strong>使い方：</strong> このページを開いた場所（ファイルURL or 公開URL）を基準に、自動でリンク先のフルURLを生成しています。<br>
        GitHub Pages や任意のサーバーに置いた場合、その公開URLがそのままQRコードに埋め込まれます。印刷したい場合はブラウザの「印刷」機能をご利用ください。
    </div>

    <script>
        // 現在のページURLを基準に、linear.html / sqrt.html の絶対URLを作る
        const base = window.location.href.replace(/\/[^\/]*$/, '/');
        const linearUrl = new URL('linear.html', base).href;
        const sqrtUrl = new URL('sqrt.html', base).href;

        document.getElementById('url-linear').textContent = linearUrl;
        document.getElementById('url-sqrt').textContent = sqrtUrl;
        document.getElementById('link-linear').href = linearUrl;
        document.getElementById('link-sqrt').href = sqrtUrl;

        // QR描画
        new QRCode(document.getElementById('qr-linear'), {
            text: linearUrl,
            width: 230,
            height: 230,
            colorDark: '#0f172a',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.M
        });

        new QRCode(document.getElementById('qr-sqrt'), {
            text: sqrtUrl,
            width: 230,
            height: 230,
            colorDark: '#0f172a',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.M
        });
    </script>

</body>

</html>
