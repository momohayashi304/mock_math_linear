<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学科指導法１ 模擬授業シミュレーター</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        /* --- 共通：外側タブ --- */
        .outer-shell {
            max-width: 1100px;
            margin: 0 auto 18px auto;
            background: #fff;
            padding: 16px 20px 0 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.08);
        }

        .outer-title {
            text-align: center;
            font-size: 1.05rem;
            color: #475569;
            margin: 0 0 10px 0;
            letter-spacing: 0.05em;
        }

        .outer-title strong {
            color: #0f172a;
            font-size: 1.2rem;
        }

        .outer-tabs {
            display: flex;
            justify-content: center;
            gap: 6px;
            border-bottom: 3px solid #0f172a;
        }

        .outer-tab-btn {
            background: #e2e8f0;
            border: 1px solid #cbd5e1;
            border-bottom: none;
            padding: 12px 28px;
            font-size: 1.05rem;
            cursor: pointer;
            color: #475569;
            font-weight: bold;
            border-radius: 8px 8px 0 0;
            transition: all 0.2s;
        }

        .outer-tab-btn:hover {
            background: #f1f5f9;
            color: #0f172a;
        }

        .outer-tab-btn.active {
            background: #0f172a;
            color: #fff;
            border-color: #0f172a;
        }

        .unit-panel {
            display: none;
        }

        .unit-panel.active {
            display: block;
        }

        /* ===================================================== */
        /* === 一次関数ユニット (Linear functions) ============= */
        /* ===================================================== */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* 内側タブのスタイル */
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            cursor: pointer;
            outline: none;
            color: #7f8c8d;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            color: #3498db;
        }

        .tab-btn.active {
            color: #3498db;
            border-bottom: 3px solid #3498db;
            margin-bottom: -2px;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .description {
            background-color: #f8f9fa;
            padding: 10px;
            border-left: 4px solid #3498db;
            margin-bottom: 15px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .layout-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .left-col {
            flex: 1;
            min-width: 330px;
        }

        .right-col {
            flex: 2;
            min-width: 400px;
            display: flex;
            flex-direction: column;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #34495e;
            color: white;
        }

        .formula-box {
            background: #e8f4f8;
            padding: 15px;
            text-align: center;
            border-radius: 6px;
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-family: "Courier New", Courier, monospace;
            font-weight: bold;
            color: #2980b9;
        }

        .controls {
            display: grid;
            gap: 15px;
            margin-bottom: 10px;
            padding: 15px;
            background: #fafafa;
            border-radius: 6px;
            border: 1px solid #eee;
        }

        .control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .control-group label {
            flex: 1;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .control-group input[type="range"] {
            flex: 1.5;
            margin: 0 10px;
        }

        .control-group span {
            flex: 0.5;
            text-align: right;
            font-weight: bold;
            color: #e74c3c;
            font-size: 1.1rem;
        }

        .prediction-box {
            background: #fff3e0;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #ffeaa7;
            margin-top: 10px;
        }

        .prediction-box h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: #d35400;
        }

        .prediction-input {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .prediction-input input[type="number"] {
            width: 70px;
            padding: 5px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .prediction-result {
            font-size: 1.1rem;
            font-weight: bold;
            color: #d35400;
            background: #fff;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            border: 1px dashed #d35400;
        }

        .chart-wrapper {
            position: relative;
            flex-grow: 1;
            min-height: 400px;
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px;
            background: white;
        }

        /* ===================================================== */
        /* === 平方根ユニット (Square roots) =================== */
        /* ===================================================== */
        .sqrt-app {
            font-family: "UD Digi Kyokasho N-R", "UD デジタル 教科書体 N-R", "Hiragino Kaku Gothic ProN", sans-serif;
            color: #334155;
            text-align: center;
        }

        .sqrt-container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .sqrt-app h2.sqrt-title {
            font-size: 1.4rem;
            color: #0f172a;
            margin-bottom: 5px;
        }

        .sqrt-app p.subtitle {
            color: #64748b;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .sqrt-app .data-panel {
            display: flex;
            justify-content: space-between;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .sqrt-app .data-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px dashed #cbd5e1;
        }

        .sqrt-app .data-box:last-child {
            border-right: none;
            background: #fff1f2;
            border-radius: 0 8px 8px 0;
        }

        .sqrt-app .data-label {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .sqrt-app .formula {
            font-family: 'Courier New', Consolas, monospace;
            font-size: 1rem;
            color: #475569;
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .sqrt-app .value {
            font-weight: bold;
            font-size: 1.3rem;
            color: #0f172a;
        }

        .sqrt-app .is-int {
            color: #16a34a !important;
            font-size: 1.5rem;
        }

        .sqrt-app .sliders-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        .sqrt-app .slider-box {
            padding: 12px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sqrt-app .slider-box.x-axis {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
        }

        .sqrt-app .slider-box.y-axis {
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
        }

        .sqrt-app .slider-box label {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .sqrt-app input[type="range"] {
            width: 100%;
            height: 8px;
            cursor: pointer;
        }

        .sqrt-app #slider-x {
            accent-color: #3b82f6;
        }

        .sqrt-app #slider-y {
            accent-color: #10b981;
        }

        .sqrt-app .canvas-container {
            position: relative;
            width: 100%;
            background: #f1f5f9;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .sqrt-app svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .sqrt-app #result-message {
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        .sqrt-app .success {
            display: flex !important;
            background-color: #dcfce7;
            color: #166534;
            border: 2px solid #22c55e;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .sqrt-app .super-success {
            display: flex !important;
            background-color: #fef08a;
            color: #854d0e;
            border: 2px solid #eab308;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .sqrt-app #unlock-btn {
            background-color: #16a34a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .sqrt-app #unlock-btn:hover {
            transform: scale(1.05);
        }

        .sqrt-app #unlock-btn:active {
            transform: scale(0.95);
        }

        @keyframes popIn {
            0% {
                transform: scale(0.9);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <!-- =============================================== -->
    <!-- 上部：単元切り替えタブ                           -->
    <!-- =============================================== -->
    <div class="outer-shell">
        <p class="outer-title"><strong>数学科指導法１</strong> ／ 模擬授業シミュレーター</p>
        <div class="outer-tabs">
            <button class="outer-tab-btn active" id="outer-tab-linear" onclick="switchUnit('linear', this)">一次関数（中2）</button>
            <button class="outer-tab-btn" id="outer-tab-sqrt" onclick="switchUnit('sqrt', this)">平方根（中3）</button>
        </div>
    </div>

    <!-- =============================================== -->
    <!-- 一次関数 ユニット                                -->
    <!-- =============================================== -->
    <div id="unit-linear" class="unit-panel active">
        <div class="container">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('altitude', this)">標高と気温</button>
                <button class="tab-btn" onclick="switchTab('car', this)">車と距離</button>
                <button class="tab-btn" onclick="switchTab('candle', this)">線香と長さ</button>
            </div>

            <h1 id="page-title">1次関数とみなすこと</h1>
            <div class="description" id="page-desc"></div>

            <div class="layout-grid">
                <div class="left-col">
                    <h3>観測・実験データ</h3>
                    <table id="dynamic-table"></table>

                    <div class="formula-box" id="formula-display">y = ax + b</div>

                    <div class="controls" id="controls-container"></div>

                    <div class="prediction-box">
                        <h3>未知の値を予測する</h3>
                        <div class="prediction-input">
                            <span id="predict-label-x">x = </span>
                            <input type="number" id="predict-x" step="0.1" value="0" oninput="updatePrediction()">
                            <span id="predict-unit-x"> のとき</span>
                        </div>
                        <div class="prediction-result" id="predict-y-calc"></div>
                        <p style="font-size: 0.8rem; color: #666; margin-top: 10px;" id="predict-note"></p>
                    </div>
                </div>

                <div class="right-col">
                    <div class="chart-wrapper">
                        <canvas id="myChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- =============================================== -->
    <!-- 平方根 ユニット                                  -->
    <!-- =============================================== -->
    <div id="unit-sqrt" class="unit-panel sqrt-app">
        <div class="sqrt-container">
            <h2 class="sqrt-title">長方形の面積とルートの計算</h2>
            <p class="subtitle" id="instruction-text">スライダーを動かして、ルートの中の数字（a, b）を変化させよう</p>

            <div class="data-panel">
                <div class="data-box">
                    <span class="data-label" style="color: #3b82f6;">横の長さ</span>
                    <div class="formula" id="form-width">√3 × √1 = √3</div>
                    <span class="value" id="val-width">1.732...</span>
                </div>
                <div class="data-box">
                    <span class="data-label" style="color: #10b981;">縦の長さ</span>
                    <div class="formula" id="form-height">√2 × √1 = √2</div>
                    <span class="value" id="val-height">1.414...</span>
                </div>
                <div class="data-box">
                    <span class="data-label" style="color: #ef4444;">面積 (縦×横)</span>
                    <div class="formula" id="form-area" style="background:#fee2e2; color:#b91c1c;">√2 × √3 = √6</div>
                    <span class="value" id="val-area" style="color: #ef4444;">2.449...</span>
                </div>
            </div>

            <div class="sliders-wrapper">
                <div class="slider-box x-axis">
                    <label for="slider-x" id="label-slider-x" style="color: #1e3a8a;">横：√b 倍する (b = 1)</label>
                    <input type="range" id="slider-x" min="1" max="3" value="1" step="1">
                </div>
                <div class="slider-box y-axis">
                    <label for="slider-y" id="label-slider-y" style="color: #047857;">縦：√a 倍する (a = 1)</label>
                    <input type="range" id="slider-y" min="1" max="2" value="1" step="1">
                </div>
            </div>

            <div id="result-message">
                <span id="result-text">🎉 面積が「ピッタリ6」になった！大成功！</span>
                <button id="unlock-btn">さらに「次の整数」を探すモードを開放！</button>
            </div>

            <div class="canvas-container">
                <svg viewBox="-0.5 -0.5 7.5 5.5">
                    <g stroke="#cbd5e1" stroke-width="0.03" stroke-dasharray="0.1 0.1">
                        <line x1="1" y1="0" x2="1" y2="5" />
                        <line x1="2" y1="0" x2="2" y2="5" />
                        <line x1="3" y1="0" x2="3" y2="5" />
                        <line x1="4" y1="0" x2="4" y2="5" />
                        <line x1="5" y1="0" x2="5" y2="5" />
                        <line x1="6" y1="0" x2="6" y2="5" />
                        <line x1="0" y1="1" x2="7" y2="1" />
                        <line x1="0" y1="2" x2="7" y2="2" />
                        <line x1="0" y1="3" x2="7" y2="3" />
                        <line x1="0" y1="4" x2="7" y2="4" />
                    </g>
                    <line x1="0" y1="0" x2="7" y2="0" stroke="#94a3b8" stroke-width="0.05" />
                    <line x1="0" y1="0" x2="0" y2="5" stroke="#94a3b8" stroke-width="0.05" />

                    <rect id="base-rect" x="0" y="0" width="1.732" height="1.414" fill="#bfdbfe" stroke="#3b82f6"
                        stroke-width="0.04" />
                    <text x="0.866" y="0.707" font-size="0.25" fill="#1e3a8a" text-anchor="middle"
                        dominant-baseline="middle" font-weight="bold">面積 √6</text>

                    <rect id="dyn-rect" x="0" y="0" width="1.732" height="1.414" fill="#fecaca" fill-opacity="0.5"
                        stroke="#ef4444" stroke-width="0.06" />

                    <text id="label-width" x="0.866" y="-0.15" font-size="0.25" fill="#ef4444" text-anchor="middle"
                        font-weight="bold">√3 × √1 = √3</text>
                    <text id="label-height" x="-0.15" y="0.707" font-size="0.25" fill="#ef4444" text-anchor="middle"
                        font-weight="bold" transform="rotate(-90, -0.15, 0.707)">√2 × √1 = √2</text>
                </svg>
            </div>
        </div>
    </div>

    <script>
        /* ================================================== */
        /* === 上部タブ：単元切替                             === */
        /* ================================================== */
        function switchUnit(unit, btnElement) {
            document.querySelectorAll('.outer-tab-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            document.querySelectorAll('.unit-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('unit-' + unit).classList.add('active');

            // 一次関数タブに戻ったとき、Chart.jsのレスポンシブが正しく動くよう再描画
            if (unit === 'linear' && chartInstance) {
                chartInstance.resize();
            }
        }

        /* ================================================== */
        /* === 一次関数：シミュレーター                        === */
        /* ================================================== */
        const scenarios = {
            altitude: {
                title: "1次関数とみなすこと（標高と気温）",
                description: "富士山周辺の観測所でのデータです。<br>現実のデータは完全に一直線にはなりませんが、おおよそ直線上に並ぶため「1次関数」とみなすことができます。<br>スライダーを動かして、赤い点に最もよく重なる直線を見つけましょう。",
                tableHeaders: ["観測所", "標高 x (km)", "気温 y (℃)"],
                obsData: [
                    { name: '甲府', x: 0.27, y: 22.1 },
                    { name: '勝沼', x: 0.39, y: 21.4 },
                    { name: '古関', x: 0.55, y: 20.5 },
                    { name: '河口湖', x: 0.86, y: 18.7 },
                    { name: '山中', x: 0.99, y: 17.9 },
                    { name: '富士山', x: 3.78, y: 1.1 }
                ],
                params: {
                    a: { label: "傾き a (変化の割合)", min: -10, max: 0, step: 0.1, value: -6.0 },
                    b: { label: "切片 b (標高0kmの気温)", min: 15, max: 30, step: 0.1, value: 23.7 }
                },
                predict: {
                    labelX: "標高 x = ", unitX: " km", yName: "気温 y", unitY: " ℃", defaultX: 2.8,
                    note: "※七合目の山小屋(2.8km)などの気温を予想してみよう。"
                },
                chartOptions: {
                    xTitle: '標高 x (km)', xMax: 4.0, xStep: 0.5,
                    yTitle: '気温 y (℃)', yMin: 0, yMax: 25, yStep: 5
                }
            },
            car: {
                title: "1次関数とみなすこと（おもちゃの車と距離）",
                description: "一定の速さで走るおもちゃの車の、時間と進んだ距離の実験データです。<br>少しの誤差はありますが、おおよそ直線上に並ぶため「1次関数」とみなせます。<br>切片b（スタート位置）が0に近いことを意識して、直線を合わせてみましょう。",
                tableHeaders: ["測定点", "時間 x (秒)", "距離 y (cm)"],
                obsData: [
                    { name: 'スタート', x: 0, y: 0.0 },
                    { name: '1秒後', x: 1, y: 15.2 },
                    { name: '2秒後', x: 2, y: 29.8 },
                    { name: '3秒後', x: 3, y: 45.1 },
                    { name: '4秒後', x: 4, y: 60.3 },
                    { name: '5秒後', x: 5, y: 74.8 }
                ],
                params: {
                    a: { label: "傾き a (速さ cm/秒)", min: 10, max: 20, step: 0.1, value: 15.0 },
                    b: { label: "切片 b (初期位置 cm)", min: -5, max: 5, step: 0.1, value: 0.0 }
                },
                predict: {
                    labelX: "時間 x = ", unitX: " 秒", yName: "距離 y", unitY: " cm", defaultX: 6.5,
                    note: "※6.5秒後にどこまで進むかを予想してみよう。"
                },
                chartOptions: {
                    xTitle: '時間 x (秒)', xMax: 8.0, xStep: 1,
                    yTitle: '距離 y (cm)', yMin: 0, yMax: 120, yStep: 20
                }
            },
            candle: {
                title: "1次関数とみなすこと（線香の燃える時間と長さ）",
                description: "火をつけた線香が燃える時間とその長さの実験データです。<br>燃えるにつれて一定の割合で短くなるため、これも「1次関数」とみなすことができます。<br>切片が「最初の長さ」、傾きが「1分間に燃える長さ」を表すことに注目しましょう。",
                tableHeaders: ["測定点", "時間 x (分)", "長さ y (cm)"],
                obsData: [
                    { name: '火をつける前', x: 0, y: 14.0 },
                    { name: '2分後', x: 2, y: 13.0 },
                    { name: '4分後', x: 4, y: 12.1 },
                    { name: '6分後', x: 6, y: 10.9 },
                    { name: '8分後', x: 8, y: 10.1 },
                    { name: '10分後', x: 10, y: 9.0 }
                ],
                params: {
                    a: { label: "傾き a (燃える速さ cm/分)", min: -1.0, max: 0.0, step: 0.05, value: -0.5 },
                    b: { label: "切片 b (最初の長さ cm)", min: 10, max: 20, step: 0.1, value: 14.0 }
                },
                predict: {
                    labelX: "時間 x = ", unitX: " 分", yName: "長さ y", unitY: " cm", defaultX: 15,
                    note: "※15分後の線香の長さを予想してみよう。"
                },
                chartOptions: {
                    xTitle: '時間 x (分)', xMax: 20, xStep: 2,
                    yTitle: '長さ y (cm)', yMin: 0, yMax: 16, yStep: 2
                }
            }
        };

        let currentMode = 'altitude';
        let chartInstance = null;

        function switchTab(mode, btnElement) {
            currentMode = mode;
            document.querySelectorAll('#unit-linear .tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            renderUI();
            initChart();
            handleInput();
        }

        function renderUI() {
            const s = scenarios[currentMode];
            document.getElementById('page-title').innerText = s.title;
            document.getElementById('page-desc').innerHTML = s.description;

            let tableHTML = `<thead><tr>`;
            s.tableHeaders.forEach(th => tableHTML += `<th>${th}</th>`);
            tableHTML += `</tr></thead><tbody>`;
            s.obsData.forEach(row => {
                tableHTML += `<tr><td>${row.name}</td><td>${row.x}</td><td>${row.y.toFixed(1)}</td></tr>`;
            });
            tableHTML += `</tbody>`;
            document.getElementById('dynamic-table').innerHTML = tableHTML;

            let controlsHTML = '';
            for (const [key, param] of Object.entries(s.params)) {
                controlsHTML += `
                    <div class="control-group">
                        <label>${param.label}</label>
                        <input type="range" id="slider-${key}" min="${param.min}" max="${param.max}" step="${param.step}" value="${param.value}" oninput="handleInput()">
                        <span id="val-${key}">${param.value.toFixed(1)}</span>
                    </div>
                `;
            }
            document.getElementById('controls-container').innerHTML = controlsHTML;

            document.getElementById('predict-label-x').innerText = s.predict.labelX;
            document.getElementById('predict-unit-x').innerText = s.predict.unitX + " のとき";
            document.getElementById('predict-note').innerText = s.predict.note;
            document.getElementById('predict-x').value = s.predict.defaultX;
        }

        function initChart() {
            const ctx = document.getElementById('myChart').getContext('2d');
            const s = scenarios[currentMode];
            const scatterData = s.obsData.map(d => ({ x: d.x, y: d.y }));

            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'scatter',
                data: {
                    datasets: [
                        {
                            label: '観測・実験データ',
                            data: scatterData,
                            backgroundColor: 'red',
                            borderColor: 'black',
                            borderWidth: 1,
                            pointRadius: 6,
                            pointHoverRadius: 8,
                            order: 2
                        },
                        {
                            label: 'みなした1次関数',
                            data: [],
                            type: 'line',
                            borderColor: 'blue',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            pointRadius: 0,
                            fill: false,
                            order: 1
                        },
                        {
                            label: '予測地点',
                            data: [],
                            backgroundColor: '#f39c12',
                            borderColor: '#e67e22',
                            borderWidth: 2,
                            pointRadius: 9,
                            pointStyle: 'star',
                            order: 3
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 0 },
                    scales: {
                        x: {
                            title: { display: true, text: s.chartOptions.xTitle, font: { size: 14 } },
                            min: 0,
                            max: s.chartOptions.xMax,
                            ticks: { stepSize: s.chartOptions.xStep }
                        },
                        y: {
                            title: { display: true, text: s.chartOptions.yTitle, font: { size: 14 } },
                            min: s.chartOptions.yMin,
                            max: s.chartOptions.yMax,
                            ticks: { stepSize: s.chartOptions.yStep }
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function (context) {
                                    if (context.datasetIndex === 0) {
                                        const index = context.dataIndex;
                                        return `${s.obsData[index].name}: (${context.parsed.x}, ${context.parsed.y})`;
                                    }
                                    return `(${context.parsed.x}, ${context.parsed.y})`;
                                }
                            }
                        }
                    }
                }
            });
        }

        function handleInput() {
            const a = parseFloat(document.getElementById('slider-a').value);
            const b = parseFloat(document.getElementById('slider-b').value);

            document.getElementById('val-a').innerText = a.toFixed(1);
            document.getElementById('val-b').innerText = b.toFixed(1);

            const signB = b < 0 ? '-' : '+';
            const absB = Math.abs(b).toFixed(1);
            document.getElementById('formula-display').innerText = `y = ${a.toFixed(1)}x ${signB} ${absB}`;

            updateChartLine(a, b);
            updatePrediction(a, b);
        }

        function updateChartLine(a, b) {
            if (!chartInstance) return;
            const xMax = scenarios[currentMode].chartOptions.xMax;

            const lineData = [
                { x: 0, y: b },
                { x: xMax, y: a * xMax + b }
            ];

            chartInstance.data.datasets[1].data = lineData;
            chartInstance.update();
        }

        function updatePrediction(a, b) {
            const sliderA = document.getElementById('slider-a');
            const sliderB = document.getElementById('slider-b');
            if (a === undefined) a = parseFloat(sliderA.value);
            if (b === undefined) b = parseFloat(sliderB.value);

            const px = parseFloat(document.getElementById('predict-x').value);
            if (isNaN(px)) return;

            const py = a * px + b;
            const s = scenarios[currentMode];

            const signB = b < 0 ? '-' : '+';
            const absB = Math.abs(b).toFixed(1);

            document.getElementById('predict-y-calc').innerText =
                `${s.predict.yName} = ${a.toFixed(1)} × ${px} ${signB} ${absB} ≒ ${py.toFixed(1)} ${s.predict.unitY}`;

            if (chartInstance) {
                chartInstance.data.datasets[2].data = [{ x: px, y: py }];
                chartInstance.update();
            }
        }

        /* ================================================== */
        /* === 平方根：シミュレーター                          === */
        /* ================================================== */
        (function initSqrtApp() {
            const sliderX = document.getElementById('slider-x');
            const sliderY = document.getElementById('slider-y');
            const dynRect = document.getElementById('dyn-rect');

            const formWidth = document.getElementById('form-width');
            const formHeight = document.getElementById('form-height');
            const formArea = document.getElementById('form-area');

            const valWidth = document.getElementById('val-width');
            const valHeight = document.getElementById('val-height');
            const valArea = document.getElementById('val-area');

            const labelSliderX = document.getElementById('label-slider-x');
            const labelSliderY = document.getElementById('label-slider-y');

            const labelWidth = document.getElementById('label-width');
            const labelHeight = document.getElementById('label-height');

            const resultMessage = document.getElementById('result-message');
            const resultText = document.getElementById('result-text');
            const unlockBtn = document.getElementById('unlock-btn');
            const instructionText = document.getElementById('instruction-text');

            let stage2Unlocked = false;

            function isPerfectSquare(n) {
                return Number.isInteger(Math.sqrt(n));
            }

            function updateVisualization() {
                const b = parseInt(sliderX.value);
                const a = parseInt(sliderY.value);

                const insideW = 3 * b;
                const insideH = 2 * a;
                const insideArea = insideW * insideH;

                const currentWidth = Math.sqrt(insideW);
                const currentHeight = Math.sqrt(insideH);
                const currentArea = Math.sqrt(insideArea);

                dynRect.setAttribute('width', currentWidth);
                dynRect.setAttribute('height', currentHeight);

                labelWidth.setAttribute('x', currentWidth / 2);
                labelHeight.setAttribute('y', currentHeight / 2);
                labelHeight.setAttribute('transform', `rotate(-90, -0.15, ${currentHeight / 2})`);

                labelSliderX.textContent = `横：√${b} 倍する (b = ${b})`;
                labelSliderY.textContent = `縦：√${a} 倍する (a = ${a})`;

                formWidth.textContent = `√3 × √${b} = √${insideW}`;
                labelWidth.textContent = `√3 × √${b} = √${insideW}`;

                formHeight.textContent = `√2 × √${a} = √${insideH}`;
                labelHeight.textContent = `√2 × √${a} = √${insideH}`;

                formArea.textContent = `√${insideH} × √${insideW} = √${insideArea}`;

                if (isPerfectSquare(insideW)) {
                    valWidth.textContent = `= ${Math.sqrt(insideW)}`;
                    valWidth.classList.add('is-int');
                } else {
                    valWidth.textContent = `≈ ${currentWidth.toFixed(3)}...`;
                    valWidth.classList.remove('is-int');
                }

                if (isPerfectSquare(insideH)) {
                    valHeight.textContent = `= ${Math.sqrt(insideH)}`;
                    valHeight.classList.add('is-int');
                } else {
                    valHeight.textContent = `≈ ${currentHeight.toFixed(3)}...`;
                    valHeight.classList.remove('is-int');
                }

                if (isPerfectSquare(insideArea)) {
                    valArea.textContent = `= ${Math.sqrt(insideArea)} (ピッタリ整数!)`;
                    valArea.classList.add('is-int');
                } else {
                    valArea.textContent = `≈ ${currentArea.toFixed(3)}...`;
                    valArea.classList.remove('is-int');
                }

                resultMessage.className = '';
                unlockBtn.style.display = 'none';

                if (!stage2Unlocked) {
                    if (a === 2 && b === 3) {
                        resultText.innerHTML = "🎉 面積が「ピッタリ 6」になった！大成功！<br>（元の面積 S は √6 だと証明できたね！）";
                        resultMessage.classList.add('success');
                        unlockBtn.style.display = 'inline-block';
                    }
                } else {
                    if (isPerfectSquare(insideArea)) {
                        if (insideArea === 36) {
                            resultText.innerHTML = "🎯 面積「6」の組み合わせ発見！";
                            resultMessage.classList.add('success');
                        } else {
                            resultText.innerHTML = `🌟 凄すぎる！面積が「ピッタリ ${Math.sqrt(insideArea)}」になる新しい組み合わせを発見！`;
                            resultMessage.classList.add('super-success');
                        }
                    }
                }
            }

            unlockBtn.addEventListener('click', () => {
                stage2Unlocked = true;
                sliderX.max = 12;
                sliderY.max = 8;

                instructionText.innerHTML = "<span style='color:#ef4444; font-weight:bold;'>【探索モード】</span> いろんな数字を組み合わせて、次に面積が「整数」になるのを探そう！";

                resultMessage.classList.remove('success');
                updateVisualization();
            });

            sliderX.addEventListener('input', updateVisualization);
            sliderY.addEventListener('input', updateVisualization);

            updateVisualization();
        })();

        /* ================================================== */
        /* === 初期化                                          === */
        /* ================================================== */
        window.onload = () => {
            const firstTab = document.querySelector('#unit-linear .tab-btn.active');
            switchTab('altitude', firstTab);
        };
    </script>
</body>

</html>
